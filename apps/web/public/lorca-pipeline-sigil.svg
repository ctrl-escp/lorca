<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Lorca Pipeline Sigil</title>
  <desc id="desc">Pipeline nodes in an L shape; the terminal node contains an L mark.</desc>

  <rect x="6" y="6" width="52" height="52" rx="14" fill="#111827"/>

  <!-- L-shaped pipeline: down from first node, then right to terminal -->
  <path
    d="M24 16 L24 40 L48 40"
    fill="none"
    stroke="#E5E7EB"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <circle cx="24" cy="16" r="6" fill="#F9FAFB"/>
  <circle cx="24" cy="40" r="6" fill="#F9FAFB"/>
  <circle cx="48" cy="40" r="6" fill="#F9FAFB"/>

  <!-- L mark: bbox center at node center (not the elbow) -->
  <g transform="translate(48 40)">
    <path
      d="M-2.5 -2.5 v5 h5"
      fill="none"
      stroke="#111827"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
